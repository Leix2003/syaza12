<!DOCTYPE html>
<html>
<head>
<title>Accessing System...</title>
<style>
body{
  margin:0;
  background:black;
  color:#00ff00;
  font-family:monospace;
  text-align:center;
  overflow:hidden;
}
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
#text{
  margin-top:120px;
  font-size:22px;
  white-space:pre-line;
}
img{
  margin-top:30px;
  width:260px;
  border-radius:15px;
  box-shadow:0 0 25px #00ff00;
  opacity:0;
  transform:translateY(40px);
  transition:all 1.5s ease;
}
.show{
  opacity:1;
  transform:translateY(0);
}
button{
  background:black;
  color:#00ff00;
  border:2px solid #00ff00;
  padding:12px 25px;
  margin:20px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  background:#00ff00;
  color:black;
}
#choices{
  display:none;
  margin-top:30px;
}
#final{
  margin-top:40px;
  font-size:28px;
  color:#ff0080;
  display:none;
  text-shadow:0 0 20px #ff0080;
}
</style>
</head>
<body>

<!-- MUSIC -->
<audio id="music" src="lagu.mp3" autoplay loop></audio>

<canvas id="matrix"></canvas>
<div id="text"></div>
<img id="pic1" src="syaza1.jpg">
<img id="pic2" src="syaza2.jpg">

<div id="choices">
<p>Pilih 1 atau 2:</p>
<button onclick="pilih(1)">1</button>
<button onclick="pilih(2)">2</button>
</div>

<div id="final">SYAZA ❤️ AIMAN</div>

<script>
// MATRIX EFFECT
let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");
canvas.height=window.innerHeight;
canvas.width=window.innerWidth;
let letters="01SYAZAAIMAN";
letters=letters.split("");
let fontSize=16;
let columns=canvas.width/fontSize;
let drops=[];
for(let x=0;x<columns;x++) drops[x]=1;
function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";
for(let i=0;i<drops.length;i++){
  let text=letters[Math.floor(Math.random()*letters.length)];
  ctx.fillText(text,i*fontSize,drops[i]*fontSize);
  if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
  drops[i]++;
}}
setInterval(draw,33);

// TYPEWRITER MESSAGE
let message=`
Connecting to secure server...

Access granted.

Decrypting secret message...

Hello Syaza...

This message is from Aiman.
`;
let i=0;
let speed=60;
function typeWriter(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(typeWriter,speed);
}else{
showLove();
}
}

// SHOW IMAGE, THEN CLEAR
function showLove(){
document.getElementById("text").innerHTML+="\n\nI LOVE YOU FOREVER ❤️";
let pic1=document.getElementById("pic1");
let pic2=document.getElementById("pic2");
pic1.classList.add("show");
setTimeout(()=>{pic2.classList.add("show");},800);

// Clear all after 3s, then show choices
setTimeout(()=>{
  document.getElementById("text").innerHTML="";
  pic1.style.display="none";
  pic2.style.display="none";
  document.getElementById("choices").style.display="block";
},3000);
}

// PILIHAN BUTTON 1 ATAU 2
function pilih(num){
document.getElementById("choices").style.display="none";
if(num===1){
  document.getElementById("text").innerHTML="Syaza pilih 1!\nAiman akan belanja Ayam Cheese 🍗🧀\nDelivery: Wednesday (Rabu) ❤️";
}else{
  document.getElementById("text").innerHTML="Syaza pilih 2!\nAiman akan bagi Bunga 🌸\nDelivery: Wednesday (Rabu) ❤️";
}
showFinal();
}

// SHOW FINAL MESSAGE
function showFinal(){
setTimeout(()=>{document.getElementById("final").style.display="block";},1000);
}

// SET VOLUME MUSIC RENDAH AGAR TYPEWRITER JELAS
document.getElementById("music").volume=0.2;

setTimeout(typeWriter,2000);
</script>
</body>
</html>
